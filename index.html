<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小朋友的键盘乐园 🎹</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d2b;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
      min-height: 100vh;
      color: #fff;
      user-select: none;
    }

    #app-shell {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100vw - 32px));
      height: min(760px, calc(100vh - 32px));
      margin: 16px auto;
      display: grid;
      grid-template-columns: 1fr 190px;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
    }

    #top-bar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    #top-bar h1 {
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1;
      letter-spacing: 0;
    }

    #friendly-prompt {
      margin-top: 8px;
      color: rgba(255,255,255,0.68);
      font-size: clamp(14px, 2vw, 20px);
    }

    #reward-panel {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .reward-pill {
      min-width: 92px;
      border: 2px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 18px;
    }

    #play-area {
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.16);
      border-radius: 26px;
      background: rgba(255,255,255,0.06);
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      cursor: pointer;
    }

    #control-dock {
      display: grid;
      gap: 10px;
      align-content: stretch;
    }

    .play-btn, .soft-btn {
      border: 2px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.09);
      color: #fff;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    .play-btn {
      min-height: 86px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 18px;
      font-family: inherit;
      font-weight: 800;
    }

    .play-btn span {
      font-size: 30px;
    }

    .play-btn:hover, .soft-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.15);
    }

    .play-btn.active {
      border-color: #ffd93d;
      background: rgba(255,217,61,0.18);
    }

    .soft-btn {
      padding: 10px 18px;
      font-size: clamp(15px, 2vw, 18px);
      font-family: inherit;
      font-weight: 800;
    }

    #recent-panel {
      grid-column: 1 / -1;
      min-height: 62px;
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
    }

    .recent-title {
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
    }

    #recent-list {
      display: flex;
      gap: 8px;
      overflow: hidden;
    }

    .recent-chip {
      border-radius: 14px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.14);
      white-space: nowrap;
      font-weight: 700;
    }

    /* ── Hint ── */
    #hint {
      color: rgba(255,255,255,0.4);
      font-size: 1.4rem;
      letter-spacing: 0.1em;
      text-align: center;
      position: absolute;
      padding: 18px;
    }

    /* ── Free / result display ── */
    #display {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-align: center;
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
      max-height: 100%;
      padding: 18px;
    }
    @keyframes popIn {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    #key-letter {
      font-size: clamp(64px, 14vw, 140px);
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 0 60px currentColor, 0 0 20px currentColor;
    }
    #emoji-box {
      font-size: clamp(44px, 8vw, 88px);
      line-height: 1;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.5));
    }
    @keyframes speakPulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.18); }
    }
    .speaking { animation: speakPulse 0.45s ease-in-out infinite; }

    /* number: big digit + 汉字 side by side */
    #num-row {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #num-arabic {
      font-size: clamp(76px, 15vw, 150px);
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 0 60px currentColor, 0 0 20px currentColor;
    }
    #num-chinese {
      font-size: clamp(70px, 13vw, 136px);
      font-weight: 900;
      line-height: 1;
      color: #fff;
      text-shadow: 0 0 40px currentColor;
    }

    /* emoji counting row */
    #count-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 85vw;
      min-height: clamp(36px, 7vw, 72px);
      font-size: clamp(30px, 6vw, 64px);
    }
    .count-item {
      animation: dotPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
      display: inline-block;
    }
    @keyframes dotPop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* SVG digit stroke */
    #svg-digit-wrap {
      width: clamp(60px,10vw,100px);
      height: clamp(84px,14vw,140px);
      opacity: 0.85;
    }
    #svg-digit-wrap svg { width: 100%; height: 100%; }

    #chinese-word {
      font-size: clamp(30px, 5.8vw, 60px);
      font-weight: 700;
      color: #fff;
    }
    #pinyin {
      font-size: clamp(17px, 2.8vw, 30px);
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.15em;
    }
    #english-word {
      font-size: clamp(13px, 2vw, 20px);
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Pinyin mode ── */
    #pinyin-mode {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }
    #pinyin-hint {
      color: rgba(255,255,255,0.35);
      font-size: 1.1rem;
    }
    #pinyin-buf-display {
      font-size: clamp(40px,9vw,90px);
      font-weight: 700;
      color: #ffd93d;
      letter-spacing: 0.12em;
      min-height: 1.2em;
      text-shadow: 0 0 30px #ffd93d88;
    }
    #pinyin-result {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    #pinyin-zi {
      font-size: clamp(80px,18vw,180px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 60px #fff4, 0 0 20px #fff4;
    }
    #pinyin-emoji { font-size: clamp(50px,10vw,100px); }
    #pinyin-py {
      font-size: clamp(18px,3.5vw,36px);
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.15em;
    }
    #pinyin-tip {
      font-size: clamp(13px,2vw,20px);
      color: rgba(255,255,255,0.3);
    }

    /* ── Quiz mode ── */
    #quiz-mode {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }
    #quiz-prompt {
      color: rgba(255,255,255,0.5);
      font-size: clamp(16px,3vw,28px);
    }
    #quiz-emoji {
      font-size: clamp(80px,18vw,180px);
      line-height: 1;
      filter: drop-shadow(0 0 30px rgba(255,255,255,0.4));
    }
    #quiz-word {
      font-size: clamp(26px,5vw,52px);
      font-weight: 700;
      color: #fff;
    }
    #quiz-feedback {
      font-size: clamp(20px,4vw,40px);
      min-height: 1.4em;
      font-weight: 700;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-12px); }
      40%      { transform: translateX(12px); }
      60%      { transform: translateX(-8px); }
      80%      { transform: translateX(8px); }
    }
    .shake { animation: shake 0.4s ease; }

    /* particles */
    #particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* ── Mobile keyboard trigger ── */
    #mobile-input {
      position: fixed;
      opacity: 0;
      width: 1px; height: 1px;
      top: 0; left: 0;
      pointer-events: none;
    }
    #keyboard-btn {
      position: fixed;
      right: 16px;
      bottom: 108px;
      background: rgba(255,255,255,0.16);
      border: 2px solid rgba(255,255,255,0.24);
      border-radius: 18px;
      width: 64px;
      height: 56px;
      font-size: 26px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      color: #fff;
    }

    @media (max-width: 760px) {
      body { overflow: hidden; }
      #app-shell {
        width: calc(100vw - 20px);
        height: calc(100vh - 20px);
        margin: 10px auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto auto;
      }
      #top-bar { align-items: flex-start; }
      #reward-panel { gap: 6px; }
      .reward-pill {
        min-width: 70px;
        padding: 8px 10px;
        font-size: 14px;
        border-radius: 14px;
      }
      #control-dock {
        grid-row: 3;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
      }
      .play-btn {
        min-height: 62px;
        border-radius: 14px;
        font-size: 12px;
        gap: 4px;
      }
      .play-btn span { font-size: 22px; }
      #recent-panel {
        grid-row: 4;
        min-height: 44px;
      }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- Hidden input for mobile keyboard -->
<input id="mobile-input" type="text" autocomplete="off" autocorrect="off"
  autocapitalize="none" spellcheck="false" />

<!-- Mobile keyboard trigger button -->
<button id="keyboard-btn" title="唤起键盘">⌨️</button>

<main id="app-shell">
  <header id="top-bar">
    <div>
      <h1>键盘游乐场</h1>
      <p id="friendly-prompt">按一个键，发现一个小惊喜</p>
    </div>
    <div id="reward-panel" aria-live="polite">
      <div class="reward-pill"><span>⭐</span><strong id="stars-count">0</strong></div>
      <div class="reward-pill"><span>连击</span><strong id="streak-count">0</strong></div>
    </div>
  </header>

  <section id="play-area" aria-live="polite">
    <div id="hint">按键盘，或点这里随机发现 ✨<br><small>Press any key or tap for surprise</small></div>

    <div id="display">
      <div id="key-letter"></div>
      <div id="emoji-box"></div>
      <div id="num-row" style="display:none">
        <div id="num-arabic"></div>
        <div id="num-chinese"></div>
        <div id="svg-digit-wrap"></div>
      </div>
      <div id="count-row"></div>
      <div id="chinese-word"></div>
      <div id="pinyin"></div>
      <div id="english-word"></div>
    </div>

    <div id="pinyin-mode">
      <div id="pinyin-hint">拼一拼 📖<br><small>输入拼音，Backspace 删除</small></div>
      <div id="pinyin-buf-display">_</div>
      <div id="pinyin-result">
        <div id="pinyin-zi"></div>
        <div id="pinyin-emoji"></div>
        <div id="pinyin-py"></div>
        <div id="pinyin-tip">继续输入下一个字</div>
      </div>
    </div>

    <div id="quiz-mode">
      <div id="quiz-prompt">小挑战：按下正确的字母键</div>
      <div id="quiz-emoji"></div>
      <div id="quiz-word"></div>
      <div id="quiz-feedback"></div>
      <button id="skip-quiz-btn" class="soft-btn" type="button">换一个</button>
    </div>
  </section>

  <aside id="control-dock" aria-label="游乐场控制台">
    <button class="play-btn active" data-action="letters" type="button"><span>🔤</span><strong>字母</strong></button>
    <button class="play-btn" data-action="numbers" type="button"><span>🔢</span><strong>数字</strong></button>
    <button class="play-btn" data-action="pinyin" type="button"><span>📖</span><strong>拼一拼</strong></button>
    <button class="play-btn" data-action="challenge" type="button"><span>🎮</span><strong>小挑战</strong></button>
    <button class="play-btn" data-action="effect" type="button"><span id="effect-icon">💥</span><strong id="effect-label">爆炸</strong></button>
  </aside>

  <section id="recent-panel" aria-label="最近发现">
    <span class="recent-title">最近发现</span>
    <div id="recent-list"></div>
  </section>
</main>

<script>

// ═══════════════════════════════════════════════════════════════

  ge:{zi:"哥",emoji:"👦",py:"gē"},
  jie:{zi:"姐",emoji:"👧",py:"jiě"},
  // 常用
  da:{zi:"大",emoji:"🔆",py:"dà"},
  xiao:{zi:"小",emoji:"🔅",py:"xiǎo"},
  hao:{zi:"好",emoji:"👍",py:"hǎo"},
  ai:{zi:"爱",emoji:"❤️",py:"ài"},
  chi:{zi:"吃",emoji:"🍽️",py:"chī"},
  he:{zi:"喝",emoji:"🥤",py:"hē"},
  // 食物
  fan:{zi:"饭",emoji:"🍚",py:"fàn"},
  tang:{zi:"糖",emoji:"🍬",py:"táng"},
  bing:{zi:"冰",emoji:"🧊",py:"bīng"},
};

// Build lookup: raw pinyin string → entry
const PINYIN_MAP = {};
for (const [key, val] of Object.entries(PINYIN_ZI)) {
  // key may have trailing digit to disambiguate; use the text as-is for lookup
  const rawKey = key.replace(/\d+$/, "");
  if (!PINYIN_MAP[rawKey]) PINYIN_MAP[rawKey] = val;
}

// All valid syllable prefixes (for early rejection)
const VALID_PREFIXES = new Set();
for (const syl of Object.keys(PINYIN_MAP)) {
  for (let i = 1; i <= syl.length; i++) VALID_PREFIXES.add(syl.slice(0, i));
}

// ═══════════════════════════════════════════════════════════════
// PALETTES & PARTICLES
// ═══════════════════════════════════════════════════════════════
const PALETTES = [
  ["#ff6b6b","#ffa07a"],["#ffd93d","#ff9100"],["#6bcb77","#00c49a"],
  ["#4d96ff","#7b2fff"],["#ff6fcf","#c44dff"],["#00e5ff","#0070ff"],
];
let paletteIdx = 0;
function nextPalette() { return PALETTES[paletteIdx++ % PALETTES.length]; }

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
let W, H, particles = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener("resize", resize); resize();

function burst(c1, c2, n = 60) {
  for (let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2, s = 3+Math.random()*9;
    particles.push({
      x:W/2,y:H/2, vx:Math.cos(a)*s, vy:Math.sin(a)*s-4,
      r:5+Math.random()*12, color:Math.random()>.5?c1:c2,
      alpha:1, decay:.012+Math.random()*.015, star:Math.random()>.5
    });
  }
}
function drawStar(cx,cy,r,color,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=(i*4*Math.PI)/5-Math.PI/2, b=a+(2*Math.PI)/5;
    ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.lineTo(cx+r*.4*Math.cos(b),cy+r*.4*Math.sin(b));
  }
  ctx.closePath();ctx.fill();ctx.restore();
}
// ── NOTE PARTICLES (mode 1) ──────────────────────────────────────
const NOTE_GLYPHS=["♩","♪","♫","♬","🎵","🎶"];
const NOTE_COLORS=["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff6fcf","#00e5ff","#ffa07a","#c44dff"];
let noteParticles=[];
function burstNotes(c1,c2,n=18){
  for(let i=0;i<n;i++){
    noteParticles.push({
      x:W/2+(Math.random()-.5)*80, y:H/2+(Math.random()-.5)*40,
      vy:-(1.2+Math.random()*2.0), vx:(Math.random()-.5)*.6,
      phase:Math.random()*Math.PI*2, amp:18+Math.random()*28,
      freq:.028+Math.random()*.018, t:0,
      glyph:NOTE_GLYPHS[Math.floor(Math.random()*NOTE_GLYPHS.length)],
      color:NOTE_COLORS[Math.floor(Math.random()*NOTE_COLORS.length)],
      size:18+Math.random()*26, alpha:1, decay:.008+Math.random()*.010,
    });
  }
}

// ── BOW-STROKE ARC PARTICLES (mode 2) ────────────────────────────
const BOW_COLORS=["#ffb347","#ffd700","#ff8c00","#ffe066","#ffa500","#e8c44d"];
let bowParticles=[];
function burstBow(c1,c2){
  const n=7+Math.floor(Math.random()*5);
  for(let i=0;i<n;i++){
    const baseAngle=(i/n)*Math.PI*2;
    bowParticles.push({
      cx:W/2, cy:H/2, angle:baseAngle,
      radius:60+Math.random()*90,
      sweep:(Math.random()>.5?1:-1)*(0.5+Math.random()*0.8),
      width:1.5+Math.random()*2.5,
      color:BOW_COLORS[Math.floor(Math.random()*BOW_COLORS.length)],
      alpha:0.85+Math.random()*.15, decay:.004+Math.random()*.005,
    });
  }
}

(function loop(){
  ctx.clearRect(0,0,W,H);
  particles=particles.filter(p=>p.alpha>.02);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=.25;p.alpha-=p.decay;
    if(p.star)drawStar(p.x,p.y,p.r,p.color,p.alpha);
    else{ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
  }
  // Note particles (mode 1)
  noteParticles=noteParticles.filter(p=>p.alpha>.02);
  for(const p of noteParticles){
    p.t++;
    p.x+=p.vx+Math.sin(p.phase+p.t*p.freq)*p.amp*.06;
    p.y+=p.vy; p.alpha-=p.decay;
    ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;
    ctx.font=`bold ${p.size|0}px serif`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(p.glyph,p.x,p.y);ctx.restore();
  }
  // Bow-stroke arc particles (mode 2)
  bowParticles=bowParticles.filter(p=>p.alpha>.02);
  for(const p of bowParticles){
    p.alpha-=p.decay;
    ctx.save();ctx.globalAlpha=p.alpha;ctx.strokeStyle=p.color;ctx.lineWidth=p.width;
    ctx.lineCap="round";ctx.beginPath();
    ctx.arc(p.cx,p.cy,p.radius,p.angle,p.angle+p.sweep);
    ctx.stroke();ctx.restore();
    p.radius+=1.4; p.width*=.992;
  }
  requestAnimationFrame(loop);
})();

// ═══════════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════════
let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playTone(freq=523,dur=.18,type="sine"){
  try{
    ensureAudio();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(.28,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
const NOTE_FREQS=[261,294,330,349,392,440,494,523,587,659,698,784,880,988,1047,1175,1319,1397,1568,1760,1976,2093,2349,2637,2794,3136];
function cheerTones(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.2,"triangle"),i*120));}
function failTone(){playTone(220,.3,"sawtooth");}

// ── Effect-mode audio ─────────────────────────────────────────────
function playArpeggio(baseFreq){
  const ratios=[1,Math.pow(2,4/12),Math.pow(2,7/12),2];
  ratios.forEach((r,i)=>setTimeout(()=>playTone(baseFreq*r,.15,"sine"),i*80));
}
function playViolin(freq,dur=.55){
  try{
    ensureAudio();
    const t=audioCtx.currentTime;
    const o=audioCtx.createOscillator(),lfo=audioCtx.createOscillator();
    const lfoGain=audioCtx.createGain(),filt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    o.type="sawtooth";o.frequency.value=freq;
    lfo.type="sine";lfo.frequency.value=5.5;
    lfoGain.gain.value=freq*0.012;
    filt.type="lowpass";filt.frequency.value=freq*4.5;filt.Q.value=1.2;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(.22,t+.08);
    g.gain.setValueAtTime(.22,t+dur-.12);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    lfo.connect(lfoGain);lfoGain.connect(o.frequency);
    o.connect(filt);filt.connect(g);g.connect(audioCtx.destination);
    o.start(t);o.stop(t+dur);lfo.start(t);lfo.stop(t+dur);
  }catch(e){}
}

// SPEECH
// ═══════════════════════════════════════════════════════════════
let ttsVoices=[];
function loadVoices(){ttsVoices=window.speechSynthesis.getVoices();}
loadVoices();
if(typeof speechSynthesis!=="undefined"&&speechSynthesis.onvoiceschanged!==undefined)
  speechSynthesis.onvoiceschanged=loadVoices;

function getBestVoice(lang){
  return ttsVoices.find(v=>v.lang===lang)||ttsVoices.find(v=>v.lang.startsWith(lang.split("-")[0]))||null;
}
let speechGen=0;
function cancelSpeech(){speechGen++;if(typeof speechSynthesis!=="undefined")speechSynthesis.cancel();}
function sayOne(text,lang="zh-CN",rate=.88,pitch=1.1){
  return new Promise(res=>{
    if(typeof speechSynthesis==="undefined"){res();return;}
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;u.rate=rate;u.pitch=pitch;
    const v=getBestVoice(lang);if(v)u.voice=v;
    u.onend=res;u.onerror=res;speechSynthesis.speak(u);
  });
}
function pause(ms){return new Promise(r=>setTimeout(r,ms));}

async function speakLetter(upper,data,gen){
  emojiBox.classList.add("speaking");
  await sayOne(upper,"en-US",.8,1.15);
  if(speechGen!==gen){emojiBox.classList.remove("speaking");return;}
  emojiBox.classList.remove("speaking");
}

async function speakNumber(n,countEmoji,gen){
  countRow.innerHTML="";
  emojiBox.classList.add("speaking");
  if(n===0){await sayOne("零","zh-CN",.8,1.1);emojiBox.classList.remove("speaking");return;}
  await sayOne(COUNT_ZH[n],"zh-CN",.8,1.1);
  emojiBox.classList.remove("speaking");
  if(speechGen!==gen)return;
  await pause(260);
  for(let i=1;i<=n;i++){
    if(speechGen!==gen)return;
    const el=document.createElement("span");
    el.className="count-item";el.textContent=countEmoji;
    countRow.appendChild(el);
    playTone(600+i*40,.12,"sine");
    burst(PALETTES[i%PALETTES.length][0],"#fff",10);
    await sayOne(COUNT_ZH[i],"zh-CN",.82,1.2);
    if(speechGen!==gen)return;
    if(i<n)await pause(100);
  }
}

let effectMode = 0;
const EFFECTS = [
  { icon: "💥", label: "爆炸" },
  { icon: "🎵", label: "音符" },
  { icon: "🎻", label: "小提琴" },
];

function updateActivityButtons(activeAction) {
  document.querySelectorAll(".play-btn").forEach(btn => {
    const action = btn.dataset.action;
    btn.classList.toggle("active", action === activeAction || (activeAction === "free" && action === "letters"));
  });
}

function updateEffectButton() {
  const fx = EFFECTS[effectMode];
  effectIconEl.textContent = fx.icon;
  effectLabelEl.textContent = fx.label;
}

function setEffectMode(n){
  effectMode = n;
  updateEffectButton();
}

document.querySelectorAll(".play-btn").forEach(btn => {
  btn.addEventListener("click", e => {
    e.stopPropagation();
    const action = btn.dataset.action;
    if (action === "letters") {
      setMode("free");
      showRandomLetter();
    } else if (action === "numbers") {
      setMode("free");
      showRandomNumber();
    } else if (action === "pinyin") {
      setMode("pinyin");
    } else if (action === "challenge") {
      setMode("quiz");
    } else if (action === "effect") {
      setEffectMode((effectMode + 1) % EFFECTS.length);
    }
  });
});

function triggerEffect(c1,c2,baseFreq,toneType="triangle",toneDur=.3){
  if(effectMode===0){ burst(c1,c2,70); playTone(baseFreq,toneDur,toneType); }
  else if(effectMode===1){ burstNotes(c1,c2,18); playArpeggio(baseFreq); }
  else if(effectMode===2){ burstBow(c1,c2); playViolin(baseFreq); }
}

function showRandomLetter() {
  const keys = Object.keys(LETTERS);
  showKey(keys[Math.floor(Math.random() * keys.length)]);
}

function showRandomNumber() {
  const keys = Object.keys(NUMBERS);
  showKey(keys[Math.floor(Math.random() * keys.length)]);
}

function showSurprise() {
  if (Math.random() < 0.7) showRandomLetter();
  else showRandomNumber();
}

function showKey(raw) {
  const upper = raw.toUpperCase();
  const isLetter = /^[A-Z]$/.test(upper);
  const isDigit  = /^[0-9]$/.test(upper);
  if (!isLetter && !isDigit) return;

  cancelSpeech();
  const gen = speechGen;
  const [c1, c2] = nextPalette();

  hint.style.display = "none";
  displayEl.style.display = "flex";
  displayEl.style.animation = "none";
  void displayEl.offsetWidth;
  displayEl.style.animation = "popIn 0.25s cubic-bezier(0.34,1.56,0.64,1)";

  document.body.style.background = `radial-gradient(ellipse at center, ${c1}22 0%, #0d0d2b 70%)`;

  if (isLetter) {
    const data = LETTERS[upper];
    keyLetter.textContent   = upper;
    keyLetter.style.color   = c1;
    keyLetter.style.display = "block";
    emojiBox.textContent    = data.emoji;
    emojiBox.classList.remove("speaking");
    numRow.style.display    = "none";
    countRow.innerHTML      = "";
    document.getElementById("svg-digit-wrap").innerHTML = "";
    chineseEl.textContent   = data.zh;
    chineseEl.style.textShadow = `0 0 30px ${c2}`;
    pinyinEl.textContent    = data.py;
    englishEl.textContent   = data.en;
    chineseEl.style.display = "";
    pinyinEl.style.display  = "";
    englishEl.style.display = "";

    triggerEffect(c1,c2,NOTE_FREQS[(upper.charCodeAt(0)-65)%NOTE_FREQS.length]);
    addReward(1);
    addDiscovery(`${upper} ${data.zh}`, data.emoji);
    speakLetter(upper, data, gen);

  } else {
    const data = NUMBERS[upper];
    const n    = data.count;
    keyLetter.style.display = "none";
    emojiBox.textContent    = ""; // no separate emoji for numbers
    emojiBox.classList.remove("speaking");

    numRow.style.display    = "flex";
    numArabic.textContent   = upper;
    numArabic.style.color   = c1;
    numChinese.textContent  = data.zh;
    numChinese.style.color  = c2;
    numChinese.style.textShadow = `0 0 40px ${c2}`;
    showDigitSVG(upper, c1);

    countRow.innerHTML      = "";
    chineseEl.style.display = "none";
    pinyinEl.style.display  = "none";
    englishEl.style.display = "none";

    if(effectMode===0){for(let i=0;i<=Math.min(n,4);i++)setTimeout(()=>playTone(300+n*40+i*60,.14),i*90);burst(c1,c2,70);}
    else if(effectMode===1){burstNotes(c1,c2,18);playArpeggio(300+n*40);}
    else if(effectMode===2){burstBow(c1,c2);playViolin(300+n*40);}

    addReward(1);
    addDiscovery(`${upper} ${data.zh}`, data.emoji);
    speakNumber(n, data.emoji, gen);
  }
}

let pinyinBuf = "";

const pinyinResultEl = document.getElementById("pinyin-result");
const pinyinZiEl     = document.getElementById("pinyin-zi");
const pinyinEmojiEl  = document.getElementById("pinyin-emoji");
const pinyinPyEl     = document.getElementById("pinyin-py");

function resetPinyin() {
  pinyinBuf = "";
  pinyinBufEl.textContent = "_";
  pinyinResultEl.style.display = "none";
  document.body.style.background = "#0d0d2b";
}

async function handlePinyinKey(key) {
  if (key === "Backspace") {
    pinyinBuf = pinyinBuf.slice(0, -1);
    pinyinBufEl.textContent = pinyinBuf || "_";
    return;
  }
  if (!/^[a-z]$/i.test(key)) return;

  const letter = key.toLowerCase();
  const next   = pinyinBuf + letter;

  // Check if next has any valid prefix
  if (!VALID_PREFIXES.has(next)) {
    // Try starting fresh with this letter
    pinyinBuf = VALID_PREFIXES.has(letter) ? letter : "";
    pinyinBufEl.textContent = pinyinBuf || "_";
    return;
  }

  pinyinBuf = next;
  pinyinBufEl.textContent = pinyinBuf;

  // Exact match?
  const match = PINYIN_MAP[pinyinBuf];
  if (match) {
    const [c1, c2] = nextPalette();
    document.body.style.background = `radial-gradient(ellipse at center, ${c1}22 0%, #0d0d2b 70%)`;
    triggerEffect(c1,c2,523);
    addReward(2);
    addDiscovery(`${match.zi} ${match.py}`, match.emoji);

    pinyinZiEl.textContent   = match.zi;
    pinyinZiEl.style.color   = c1;
    pinyinZiEl.style.textShadow = `0 0 60px ${c1}`;
    pinyinEmojiEl.textContent = match.emoji;
    pinyinPyEl.textContent   = match.py;
    pinyinResultEl.style.display = "flex";
    pinyinResultEl.style.animation = "none";
    void pinyinResultEl.offsetWidth;
    pinyinResultEl.style.animation = "popIn 0.25s cubic-bezier(0.34,1.56,0.64,1)";
    cancelSpeech();
    const gen = speechGen;
    await sayOne(match.zi, "zh-CN", .82, 1.1);

    // Reset buf, keep result visible
    pinyinBuf = "";
    pinyinBufEl.textContent = "_";
  }
}

function nextQuiz() {

  cancelSpeech();
  const gen = speechGen;
  (async () => {
    await pause(300);
    if (speechGen !== gen) return;
    await sayOne(data.zh, "zh-CN", .82, 1.1);
  })();
}

async function handleQuizKey(key) {
  if (quizLocked) return;
  const upper = key.toUpperCase();
  if (!/^[A-Z]$/.test(upper)) return;

  if (upper === quizAnswer) {
    quizLocked = true;
    quizFeedbackEl.textContent = "🎉 太棒了！";
    quizFeedbackEl.style.color = "#6bcb77";
    if(effectMode===0){burst("#6bcb77","#ffd93d",100);cheerTones();}
    else if(effectMode===1){burstNotes("#6bcb77","#ffd93d",30);playArpeggio(523);}
    else if(effectMode===2){burstBow("#ffd700","#ff8c00");playViolin(523,.8);}
    addReward(3);
    addDiscovery(`${quizAnswer} ${LETTERS[quizAnswer].zh}`, LETTERS[quizAnswer].emoji);
    cancelSpeech();
    await sayOne("太棒了！真厉害！","zh-CN",.85,1.2);
    await pause(1200);
    if (currentMode === "quiz") nextQuiz();
  } else {
    quizFeedbackEl.textContent = "再试试！";
    quizFeedbackEl.style.color = "#ff6b6b";
    quizEmojiEl.classList.add("shake");
    quizEmojiEl.addEventListener("animationend", () => quizEmojiEl.classList.remove("shake"), {once:true});
    failTone();
    cancelSpeech();
    await sayOne("再试试！","zh-CN",.82,1.1);
  }
}

// ═══════════════════════════════════════════════════════════════
// INPUT ROUTER
// ═══════════════════════════════════════════════════════════════
document.addEventListener("keydown", e => {
  if (e.repeat) return;
  if (e.key === "Tab") { e.preventDefault(); const modes=["free","pinyin","quiz"]; setMode(modes[(modes.indexOf(currentMode)+1)%3]); return; }
  if (e.key === "`") { setEffectMode((effectMode+1)%3); return; }
  if (e.key === "F11") return;

  if (currentMode === "free")   showKey(e.key);
  else if (currentMode === "pinyin") handlePinyinKey(e.key);
  else if (currentMode === "quiz")   handleQuizKey(e.key);
});

// Touch: the stage acts as a friendly surprise area.
document.getElementById("play-area").addEventListener("click", e => {
  if (e.target.closest("button")) return;
  if (currentMode === "free") showSurprise();
  else if (currentMode === "quiz") nextQuiz();
});

// Mobile keyboard support
const mobileInput = document.getElementById("mobile-input");
const keyboardBtn = document.getElementById("keyboard-btn");

const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
if (isMobile) keyboardBtn.style.display = "flex";

keyboardBtn.addEventListener("click", () => {
  mobileInput.style.pointerEvents = "auto";
  mobileInput.focus();
  mobileInput.style.pointerEvents = "none";
});

let lastVal = "";
mobileInput.addEventListener("input", () => {
  const val = mobileInput.value;
  const added = val.slice(lastVal.length);
  lastVal = val;
  for (const ch of added) {
    if (currentMode === "free")        showKey(ch);
    else if (currentMode === "pinyin") handlePinyinKey(ch);
    else if (currentMode === "quiz")   handleQuizKey(ch);
  }
  if (mobileInput.value.length > 20) { mobileInput.value = ""; lastVal = ""; }
});

mobileInput.addEventListener("keydown", e => {
  if (e.key === "Backspace" && currentMode === "pinyin") handlePinyinKey("Backspace");
});

// Init
renderRewards();
updateEffectButton();
setMode("free");
</script>
